name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: make test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          args: --timeout=5m

  proto-check:
    name: Proto generated files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Regenerate proto stubs
        run: buf generate

      - name: Fail if gen/ has uncommitted changes
        run: |
          if ! git diff --quiet gen/; then
            echo "::error::gen/ is out of sync with proto sources. Run 'buf generate' and commit the result."
            git diff gen/
            exit 1
          fi

  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: |
          helm lint deploy/helm/signet \
            --set signet.trustDomain=example.org \
            --set signet.existingSecret=signet-secrets

      - name: Validate chart schema
        run: |
          helm template signet deploy/helm/signet \
            --set signet.trustDomain=example.org \
            --set signet.existingSecret=signet-secrets \
            > /dev/null

  build:
    name: Build binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build

  docker-build:
    name: Docker build (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build signetd image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: signetd
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build signet CLI image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: signet
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
