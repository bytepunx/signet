name: Publish

# Publish signetd to ghcr.io on every merge to main.
# Tagged releases use release.yml instead (which also sets semver/latest tags).
# This workflow produces the `main` image tag for use in dev clusters.

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write   # push to ghcr.io

jobs:
  push-image:
    name: Push signetd image (main)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push signetd
        uses: docker/build-push-action@v6
        with:
          context: .
          target: signetd
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/signetd:main
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
