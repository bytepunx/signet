name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write       # create GitHub releases and upload assets
  packages: write       # push to ghcr.io
  id-token: write       # OIDC token for provenance attestation (future)

jobs:
  # ---------------------------------------------------------------------------
  # Build CLI binaries for all target platforms
  # ---------------------------------------------------------------------------
  build-cli:
    name: Build CLI (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BINARY="signet-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "dist/${BINARY}" \
            ./cmd/signet
          sha256sum "dist/${BINARY}" >> dist/sha256sums.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Build and push signetd Docker image
  # ---------------------------------------------------------------------------
  build-image:
    name: Build and push signetd image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/signetd
            docker.io/bytepunx/signet
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push signetd
        uses: docker/build-push-action@v6
        with:
          context: .
          target: signetd
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Package and publish Helm chart as OCI artifact
  # ---------------------------------------------------------------------------
  publish-chart:
    name: Publish Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io \
              --username "${{ github.actor }}" \
              --password-stdin

      - name: Package chart
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"   # strip leading 'v'
          helm package deploy/helm/signet \
            --version "${VERSION}" \
            --app-version "${{ github.ref_name }}" \
            --destination dist/

      - name: Push chart to OCI registry
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          helm push "dist/signet-${VERSION}.tgz" \
            oci://ghcr.io/${{ github.repository_owner }}/charts

  # ---------------------------------------------------------------------------
  # Create GitHub release and attach all assets
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [build-cli, build-image, publish-chart]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog generation

      - name: Download all CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: dist/
          merge-multiple: true

      - name: Consolidate checksums
        working-directory: dist
        run: |
          # Merge per-platform sha256sums into one file.
          cat sha256sums.txt | sort -k2 > sha256sums-sorted.txt
          mv sha256sums-sorted.txt sha256sums.txt

      - name: Generate release notes
        id: notes
        run: |
          # Extract the section for this tag from CHANGELOG.md if it exists,
          # otherwise fall back to a commit log since the previous tag.
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [[ -f CHANGELOG.md ]]; then
            # Pull the block between this tag heading and the next.
            awk "/^## ${{ github.ref_name }}/{found=1; next} found && /^## /{exit} found{print}" \
              CHANGELOG.md > release_notes.md
          fi
          if [[ ! -s release_notes.md ]]; then
            echo "## Changes" > release_notes.md
            if [[ -n "$PREV_TAG" ]]; then
              git log --oneline "${PREV_TAG}..HEAD" >> release_notes.md
            else
              git log --oneline >> release_notes.md
            fi
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            dist/signet-*
            dist/sha256sums.txt
