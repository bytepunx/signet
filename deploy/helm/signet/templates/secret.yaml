{{- if not .Values.signet.existingSecret }}
{{- if not (and .Values.signet.dbConnString .Values.signet.auditChainKey) }}
{{- fail "Set signet.existingSecret (recommended for production) or both signet.dbConnString and signet.auditChainKey" }}
{{- end }}
# WARNING: Embedding secrets in values.yaml is only appropriate for local development.
# In production, pre-create a Secret with SIGNET_DB_CONN_STRING and SIGNET_AUDIT_CHAIN_KEY,
# then set signet.existingSecret to its name (e.g. via external-secrets or sealed-secrets).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "signet.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "signet.labels" . | nindent 4 }}
type: Opaque
stringData:
  SIGNET_DB_CONN_STRING: {{ .Values.signet.dbConnString | quote }}
  SIGNET_AUDIT_CHAIN_KEY: {{ .Values.signet.auditChainKey | quote }}
{{- end }}
