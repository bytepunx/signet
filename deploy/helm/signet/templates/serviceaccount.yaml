{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "signet.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "signet.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
{{- end }}
---
{{- if .Values.adminServiceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "signet.adminServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "signet.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
# Operators request short-lived tokens from this SA to authenticate to the admin endpoint:
#   kubectl create token {{ include "signet.adminServiceAccountName" . }} -n {{ .Release.Namespace }} --duration=1h
automountServiceAccountToken: false
{{- end }}
