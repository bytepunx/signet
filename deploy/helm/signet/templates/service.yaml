apiVersion: v1
kind: Service
metadata:
  name: {{ include "signet.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "signet.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "signet.selectorLabels" . | nindent 4 }}
  ports:
    - name: grpc
      port: {{ .Values.service.port }}
      targetPort: grpc
      protocol: TCP
    {{- if .Values.signet.webhookAddr }}
    - name: webhook
      port: 8445
      targetPort: webhook
      protocol: TCP
    {{- end }}
# Note: the admin port (8444) is NOT exposed here. It is bound to 127.0.0.1
# inside the container. Operators access it exclusively via:
#   kubectl port-forward -n <namespace> svc/signet 8444:8444
